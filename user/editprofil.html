<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/bootstrap.css">

    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">

</head>

<body>
    <div class="container-dashboard">
        <!-- User image -->
        <div class="container-img-user">
            <img class="img-user" src="../images/user/teacher copy.jpg">
            </img>
            <div class="nama-user mt-1">
                Faiz Alauddin Ma'ruf
            </div>
        </div>


        <!-- Side navigation -->
        <div class="sidenav border-info shadow-lg d-flex justify-content-center">
            <div class="list-sidenav"> <a href="index.html"><span class="jam jam-ghost-org"></span> Katalog
                    Kelas</a></div>
            <div class="list-sidenav "> <a href="kelassaya.html"><span class="jam jam-ghost-org-square"></span>
                    Kelas Saya</a>
            </div>
            <div class="list-sidenav active"> <a href="editprofil.html"><span class="jam jam-user-circle"></span> Edit
                    Profil</a>
            </div>
            <div class="list-sidenav hidden-keluar"> <a href="#"><span class="jam jam-log-out"></span> Keluar</a>
            </div>
        </div>



        <!-- Page content -->
        <div class="main d-flex flex-column">
            <div class="container">
                <div class="judul-atas">
                    Edit Profil
                </div>
                <div class="judul-des mt-1">
                    Berikan Informasi Yang Valid
                </div>
            </div>
            <div class="continer m-auto">
                <div class="row container-formulir">
                    <div class="col-lg-6 shadow pl-5 pr-5">
                        <div class="d-flex flex-column ">
                            <div class="pl-3"><img src="../images/iconhuman.png" alt="iconhuman" width="10%"></div>
                            <div class="text-registrasi">Edit Akun Profil GuruBisa</div>
                            <div class="text-buatakun">Edit Profil Akun</div>
                        </div>
                        <form action="/action_page.php">
                            <div>
                                <label for="nama"></label>
                                <input type="text" class="form-control" name="name" placeholder="Nama Lengkap"
                                    id="nama">
                            </div>
                            <div>
                                <label for="email"></label>
                                <input type="email" class="form-control" name="email" placeholder="Alamat Email"
                                    id="email">
                            </div>
                            <div>
                                <label for="pwd"></label>
                                <input type="password" class="form-control" name="password" placeholder="Password"
                                    id="pwd">
                            </div>
                            <div>
                                <label for="nuptk"></label>
                                <input type="text" class="form-control" name="nuptk" placeholder="NUPTK" id="nuptk">
                            </div>
                            <div>
                                <label for="jeniskelamin"></label>
                                <select class="form-control" id="jeniskelamin" name="jeniskelamin"
                                    placeholder="Jenis Kelamin">

                                    <option disabled selected>Pilih Jenis Kelamin</option>
                                    <option>Laki-Laki</option>
                                    <option>Perempuan</option>
                                </select>
                            </div>
                            <div>
                                <label for="image-user"></label>
                                <span class="form-control">Pilih Foto Profil</span>
                                <input type="file" class="form-control" name="imguser" id="image-user">
                            </div>
                            <div class="mt-3 d-flex mb-3">
                                <button type="submit" class="button-primary-daftar">Simpan Profil</button>
                            </div>
                        </form>

                    </div>
                    <div class="col-lg-6">
                        <img src="../images/ben-mullins-je240KkJIuA-unsplash.jpg" alt="" width="100%" height="100%">
                    </div>
                </div>

            </div>
        </div>
    </div>




    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
    <script src="https://unpkg.com/jam-icons/js/jam.min.js"></script>
</body>

</html>
